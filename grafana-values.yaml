persistence:
  enabled: true
  size: 1Gi

adminPassword: admin

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring:3100